        <rect width="50" height="40" rx="6" fill="#DD0031"/>
        <text x="25" y="25" text-anchor="middle" class="pixel-font label-light" font-size="9">AN</text>
      </g>
      <!-- 7. HTML -->
      <g transform="translate(396,26)">
        <rect width="50" height="40" rx="6" fill="#E34F26"/>
        <text x="25" y="25" text-anchor="middle" class="pixel-font label-light" font-size="9">HT</text>
      </g>
      <!-- 8. CSS -->
      <g transform="translate(462,26)">
        <rect width="50" height="40" rx="6" fill="#1572B6"/>
        <text x="25" y="25" text-anchor="middle" class="pixel-font label-light" font-size="9">CS</text>
      </g>
      <!-- 9. Node.js -->
