        <text x="25" y="25" text-anchor="middle" class="pixel-font label-dark" font-size="9">JS</text>
      </g>
      <g transform="translate(726,26)">
        <rect width="50" height="40" rx="6" fill="#3178C6"/>
        <text x="25" y="25" text-anchor="middle" class="pixel-font label-light" font-size="9">TS</text>
      </g>
      <g transform="translate(792,26)">
        <rect width="50" height="40" rx="6" fill="#3776AB"/>
        <text x="25" y="25" text-anchor="middle" class="pixel-font label-light" font-size="9">PY</text>
      </g>
      <g transform="translate(858,26)">
