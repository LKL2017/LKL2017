<svg viewBox="0 0 900 130" width="900" height="130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
      .pixel-font { font-family: 'Press Start 2P', 'Courier New', monospace; }
      .label-light { fill: #fff; }
      .label-dark { fill: #222; }

      @keyframes scrollRight {
        0%   { transform: translateX(0); }
        100% { transform: translateX(-660px); }
      }
      @keyframes scrollLeft {
        0%   { transform: translateX(-660px); }
        100% { transform: translateX(0); }
      }
      .row1 { animation: scrollRight 20s linear infinite; }
      .row2 { animation: scrollLeft 22s linear infinite; }
    </style>

    <!-- Edge fade mask -->
    <linearGradient id="fadeMask" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="900" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="8%" stop-color="white" stop-opacity="1"/>
      <stop offset="92%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="edgeFade">
      <rect width="900" height="130" fill="url(#fadeMask)"/>
    </mask>
  </defs>

  <!-- Title -->
  <text x="450" y="16" text-anchor="middle" class="pixel-font" font-size="8" fill="#555" letter-spacing="2">COLLECTED SPECIMENS</text>

  <!-- Scrolling content with edge fade mask -->
  <g mask="url(#edgeFade)">

    <!-- Row 1: scrolls right (10 icons duplicated = 20) -->
    <g class="row1">
      <!-- First set -->
      <!-- 1. JavaScript -->
      <g transform="translate(0,26)">
        <rect width="50" height="40" rx="6" fill="#F7DF1E"/>
        <text x="25" y="25" text-anchor="middle" class="pixel-font label-dark" font-size="9">JS</text>
      </g>
      <!-- 2. TypeScript -->
      <g transform="translate(66,26)">
        <rect width="50" height="40" rx="6" fill="#3178C6"/>
        <text x="25" y="25" text-anchor="middle" class="pixel-font label-light" font-size="9">TS</text>
      </g>
      <!-- 3. Python -->
      <g transform="translate(132,26)">
        <rect width="50" height="40" rx="6" fill="#3776AB"/>
        <text x="25" y="25" text-anchor="middle" class="pixel-font label-light" font-size="9">PY</text>
      </g>
      <!-- 4. React -->
      <g transform="translate(198,26)">
        <rect width="50" height="40" rx="6" fill="#61DAFB"/>
        <text x="25" y="25" text-anchor="middle" class="pixel-font label-dark" font-size="9">RE</text>
      </g>
      <!-- 5. Vue -->
      <g transform="translate(264,26)">
        <rect width="50" height="40" rx="6" fill="#4FC08D"/>
        <text x="25" y="25" text-anchor="middle" class="pixel-font label-light" font-size="9">VU</text>
      </g>
      <!-- 6. Angular -->
