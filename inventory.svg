<svg viewBox="0 0 600 120" width="600" height="120" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <style>
      @keyframes scrollLeft {
        0%   { transform: translateX(0); }
        100% { transform: translateX(-560px); }
      }
      @keyframes scrollRight {
        0%   { transform: translateX(-560px); }
        100% { transform: translateX(0); }
      }
      .row1 { animation: scrollLeft 20s linear infinite; }
      .row2 { animation: scrollRight 20s linear infinite; }
    </style>
    <clipPath id="viewMask">
      <rect x="0" y="0" width="600" height="120"/>
    </clipPath>
  </defs>

  <g clip-path="url(#viewMask)">

    <!-- Row 1: scrolls left -->
    <g class="row1">
