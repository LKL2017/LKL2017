        <text x="25" y="25" text-anchor="middle" class="pixel-font label-dark" font-size="9">RE</text>
      </g>
      <g transform="translate(924,26)">
        <rect width="50" height="40" rx="6" fill="#4FC08D"/>
        <text x="25" y="25" text-anchor="middle" class="pixel-font label-light" font-size="9">VU</text>
      </g>
      <g transform="translate(990,26)">
        <rect width="50" height="40" rx="6" fill="#DD0031"/>
        <text x="25" y="25" text-anchor="middle" class="pixel-font label-light" font-size="9">AN</text>
      </g>
      <g transform="translate(1056,26)">
        <rect width="50" height="40" rx="6" fill="#E34F26"/>
        <text x="25" y="25" text-anchor="middle" class="pixel-font label-light" font-size="9">HT</text>
      </g>
      <g transform="translate(1122,26)">
        <rect width="50" height="40" rx="6" fill="#1572B6"/>
        <text x="25" y="25" text-anchor="middle" class="pixel-font label-light" font-size="9">CS</text>
      </g>
      <g transform="translate(1188,26)">
        <rect width="50" height="40" rx="6" fill="#339933"/>
        <text x="25" y="25" text-anchor="middle" class="pixel-font label-light" font-size="9">ND</text>
