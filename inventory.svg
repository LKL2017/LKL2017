      <g transform="translate(660,76)">
        <rect width="50" height="40" rx="6" fill="#F05032"/>
        <text x="25" y="25" text-anchor="middle" class="pixel-font label-light" font-size="9">GI</text>
      </g>
      <g transform="translate(726,76)">
        <rect width="50" height="40" rx="6" fill="#646CFF"/>
        <text x="25" y="25" text-anchor="middle" class="pixel-font label-light" font-size="9">VI</text>
      </g>
      <g transform="translate(792,76)">
        <rect width="50" height="40" rx="6" fill="#8DD6F9"/>
        <text x="25" y="25" text-anchor="middle" class="pixel-font label-dark" font-size="9">WP</text>
      </g>
      <g transform="translate(858,76)">
        <rect width="50" height="40" rx="6" fill="#47848F"/>
        <text x="25" y="25" text-anchor="middle" class="pixel-font label-light" font-size="9">EL</text>
      </g>
      <g transform="translate(924,76)">
        <rect width="50" height="40" rx="6" fill="#000000"/>
        <text x="25" y="25" text-anchor="middle" class="pixel-font label-light" font-size="9">3D</text>
      </g>
      <g transform="translate(990,76)">
        <rect width="50" height="40" rx="6" fill="#ED225D"/>
        <text x="25" y="25" text-anchor="middle" class="pixel-font label-light" font-size="9">P5</text>
      </g>
      <g transform="translate(1056,76)">
        <rect width="50" height="40" rx="6" fill="#EE4C2C"/>
        <text x="25" y="25" text-anchor="middle" class="pixel-font label-light" font-size="9">PT</text>
      </g>
      <g transform="translate(1122,76)">
        <rect width="50" height="40" rx="6" fill="#c4956a"/>
        <text x="25" y="25" text-anchor="middle" class="pixel-font label-light" font-size="9">CL</text>
      </g>
      <g transform="translate(1188,76)">
        <rect width="50" height="40" rx="6" fill="#42A5F5"/>
        <text x="25" y="25" text-anchor="middle" class="pixel-font label-light" font-size="9">CU</text>
