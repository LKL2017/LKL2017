<svg viewBox="0 0 900 200" width="900" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main title gradient with color rotation -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b6b">
        <animate attributeName="stop-color"
          values="#ff6b6b;#feca57;#48dbfb;#ff9ff3;#54a0ff;#ff6b6b"
          dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="25%" stop-color="#feca57">
        <animate attributeName="stop-color"
          values="#feca57;#48dbfb;#ff9ff3;#54a0ff;#ff6b6b;#feca57"
          dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#48dbfb">
        <animate attributeName="stop-color"
          values="#48dbfb;#ff9ff3;#54a0ff;#ff6b6b;#feca57;#48dbfb"
          dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="75%" stop-color="#ff9ff3">
        <animate attributeName="stop-color"
          values="#ff9ff3;#54a0ff;#ff6b6b;#feca57;#48dbfb;#ff9ff3"
          dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#54a0ff">
        <animate attributeName="stop-color"
          values="#54a0ff;#ff6b6b;#feca57;#48dbfb;#ff9ff3;#54a0ff"
          dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Bottom line gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0"/>
      <stop offset="20%" stop-color="#ff6b6b">
        <animate attributeName="stop-color"
          values="#ff6b6b;#feca57;#48dbfb;#ff9ff3;#54a0ff;#ff6b6b"
          dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#48dbfb">
        <animate attributeName="stop-color"
          values="#48dbfb;#ff9ff3;#54a0ff;#ff6b6b;#feca57;#48dbfb"
          dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="80%" stop-color="#54a0ff">
        <animate attributeName="stop-color"
          values="#54a0ff;#ff6b6b;#feca57;#48dbfb;#ff9ff3;#54a0ff"
          dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#54a0ff" stop-opacity="0"/>
    </linearGradient>

    <!-- Star shape -->
    <polygon id="star" points="0,-8 2.2,-2.8 8,-2.8 3.6,1.2 5.4,7.2 0,3.6 -5.4,7.2 -3.6,1.2 -8,-2.8 -2.2,-2.8"
      fill="url(#titleGrad)" opacity="0.6"/>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="#fafafa"/>

  <!-- Floating decorative dots -->
  <!-- Dot 1 - coral -->
  <circle cx="80" cy="40" r="6" fill="#ff6b6b" opacity="0.4">
    <animate attributeName="cy" values="40;28;40" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Dot 2 - gold -->
  <circle cx="180" cy="160" r="4" fill="#feca57" opacity="0.5">
    <animate attributeName="cy" values="160;145;160" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Dot 3 - sky blue -->
  <circle cx="720" cy="35" r="5" fill="#48dbfb" opacity="0.45">
    <animate attributeName="cy" values="35;22;35" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.45;0.75;0.45" dur="4.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Dot 4 - pink -->
  <circle cx="820" cy="150" r="7" fill="#ff9ff3" opacity="0.35">
    <animate attributeName="cy" values="150;135;150" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.35;0.65;0.35" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Dot 5 - blue -->
  <circle cx="140" cy="100" r="3.5" fill="#54a0ff" opacity="0.5">
    <animate attributeName="cy" values="100;88;100" dur="3.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Dot 6 - coral small -->
  <circle cx="760" cy="90" r="3" fill="#ff6b6b" opacity="0.4">
    <animate attributeName="cy" values="90;78;90" dur="4.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="4.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Dot 7 - gold small -->
  <circle cx="350" cy="30" r="4" fill="#feca57" opacity="0.35">
    <animate attributeName="cy" values="30;18;30" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.35;0.6;0.35" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Dot 8 - sky blue -->
  <circle cx="550" cy="165" r="5" fill="#48dbfb" opacity="0.4">
    <animate attributeName="cy" values="165;150;165" dur="4.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="4.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Spinning star 1 -->
  <use href="#star" x="250" y="50" transform="translate(250,50)">
    <animateTransform attributeName="transform" type="rotate"
      from="0 250 50" to="360 250 50" dur="12s" repeatCount="indefinite"/>
  </use>

  <!-- Spinning star 2 -->
  <use href="#star" x="680" y="55" transform="translate(680,55)">
    <animateTransform attributeName="transform" type="rotate"
      from="360 680 55" to="0 680 55" dur="15s" repeatCount="indefinite"/>
  </use>

  <!-- Main title: Hello World -->
  <text x="450" y="90" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="52" font-weight="700" fill="url(#titleGrad)"
    letter-spacing="2">
    Hello World
  </text>

  <!-- Subtitle -->
  <text x="450" y="128" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="14" fill="#888" font-weight="400"
    letter-spacing="6">
    WELCOME TO MY CREATIVE SPACE
  </text>

  <!-- Bottom breathing decorative line -->
  <line x1="250" y1="180" x2="650" y2="180"
    stroke="url(#lineGrad)" stroke-width="2" stroke-linecap="round">
    <animate attributeName="x1" values="250;300;250" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="650;600;650" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
  </line>
</svg>
