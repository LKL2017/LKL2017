<svg viewBox="0 0 400 220" width="400" height="220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
      .pixel-font { font-family: 'Press Start 2P', 'Courier New', monospace; }

      /* Pixel corner breathing animations — staggered */
      @keyframes cornerPulse1 { 0%,100%{opacity:0.4} 50%{opacity:1} }
      @keyframes cornerPulse2 { 0%,100%{opacity:1} 50%{opacity:0.4} }
      @keyframes cornerPulse3 { 0%,100%{opacity:0.5} 60%{opacity:1} }
      @keyframes cornerPulse4 { 0%,100%{opacity:1} 40%{opacity:0.4} }
      .corner-tl { animation: cornerPulse1 3s ease-in-out infinite; }
      .corner-tr { animation: cornerPulse2 3.4s ease-in-out infinite; }
      .corner-bl { animation: cornerPulse3 2.8s ease-in-out infinite; }
      .corner-br { animation: cornerPulse4 3.6s ease-in-out infinite; }

      /* Sparkle animations */
      @keyframes sparkleRotate1 { 0%{transform:rotate(0deg);opacity:0.3} 50%{transform:rotate(180deg);opacity:1} 100%{transform:rotate(360deg);opacity:0.3} }
      @keyframes sparkleRotate2 { 0%{transform:rotate(0deg);opacity:1} 50%{transform:rotate(180deg);opacity:0.2} 100%{transform:rotate(360deg);opacity:1} }
      @keyframes sparkleRotate3 { 0%{transform:rotate(45deg);opacity:0.5} 50%{transform:rotate(225deg);opacity:1} 100%{transform:rotate(405deg);opacity:0.5} }
      @keyframes sparkleRotate4 { 0%{transform:rotate(0deg);opacity:0.6} 50%{transform:rotate(180deg);opacity:0.1} 100%{transform:rotate(360deg);opacity:0.6} }
      .sparkle1 { animation: sparkleRotate1 2.5s ease-in-out infinite; transform-origin: 160px 34px; }
      .sparkle2 { animation: sparkleRotate2 3.2s ease-in-out infinite; transform-origin: 245px 30px; }
      .sparkle3 { animation: sparkleRotate3 2.8s ease-in-out infinite; transform-origin: 370px 24px; }
      .sparkle4 { animation: sparkleRotate4 4s ease-in-out infinite; transform-origin: 355px 42px; }
    </style>

    <!-- Gradient for sparkles -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA000"/>
    </linearGradient>
    <linearGradient id="rainbowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="50%" stop-color="#4ECDC4"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>

    <!-- Shine gradient for stat bars -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Clip paths for stat bar shine -->
    <clipPath id="clipCRE"><rect x="80" y="66" width="211" height="16" rx="2"/></clipPath>
    <clipPath id="clipTEC"><rect x="80" y="96" width="185" height="16" rx="2"/></clipPath>
    <clipPath id="clipEXP"><rect x="80" y="126" width="163" height="16" rx="2"/></clipPath>
    <clipPath id="clipSYN"><rect x="80" y="156" width="108" height="16" rx="2"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="220" rx="2" fill="#fafaf5"/>

  <!-- Outer border (pixel double-line) -->
  <rect x="4" y="4" width="392" height="212" rx="1" fill="none" stroke="#555" stroke-width="3"/>
  <!-- Inner border -->
  <rect x="10" y="10" width="380" height="200" rx="1" fill="none" stroke="#999" stroke-width="1.5"/>

  <!-- ===== Pixel Corner Marks (L-shaped) ===== -->
  <!-- Top-left -->
  <g class="corner-tl">
    <rect x="1" y="1" width="6" height="6" fill="#555"/>
    <rect x="1" y="7" width="6" height="6" fill="#555"/>
    <rect x="7" y="1" width="6" height="6" fill="#555"/>
  </g>
  <!-- Top-right -->
  <g class="corner-tr">
    <rect x="393" y="1" width="6" height="6" fill="#555"/>
    <rect x="393" y="7" width="6" height="6" fill="#555"/>
    <rect x="387" y="1" width="6" height="6" fill="#555"/>
  </g>
  <!-- Bottom-left -->
  <g class="corner-bl">
    <rect x="1" y="213" width="6" height="6" fill="#555"/>
    <rect x="1" y="207" width="6" height="6" fill="#555"/>
    <rect x="7" y="213" width="6" height="6" fill="#555"/>
  </g>
  <!-- Bottom-right -->
  <g class="corner-br">
    <rect x="393" y="213" width="6" height="6" fill="#555"/>
    <rect x="393" y="207" width="6" height="6" fill="#555"/>
    <rect x="387" y="213" width="6" height="6" fill="#555"/>
  </g>

  <!-- ===== Sparkle Stars ===== -->
  <g class="sparkle1">
    <path d="M160,30 l0,-4 l0,4 l0,4 l0,-4 l-4,0 l4,0 l4,0 Z" fill="url(#goldGrad)" stroke="none"/>
  </g>
  <g class="sparkle2">
    <path d="M245,26 l0,-5 l0,5 l0,5 l0,-5 l-5,0 l5,0 l5,0 Z" fill="url(#rainbowGrad)" stroke="none"/>
  </g>
  <g class="sparkle3">
    <path d="M370,20 l0,-3 l0,3 l0,3 l0,-3 l-3,0 l3,0 l3,0 Z" fill="url(#goldGrad)" stroke="none"/>
  </g>
  <g class="sparkle4">
    <path d="M355,38 l0,-2.5 l0,2.5 l0,2.5 l0,-2.5 l-2.5,0 l2.5,0 l2.5,0 Z" fill="#FFD700" stroke="none"/>
  </g>

  <!-- Title -->
  <text x="200" y="38" text-anchor="middle" class="pixel-font" font-size="12" fill="#333" letter-spacing="2">TRAINER CARD</text>

  <!-- Divider line under title -->
  <line x1="20" y1="48" x2="380" y2="48" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== Stat bars ===== -->

  <!-- CRE - Creativity -->
  <text x="28" y="78" class="pixel-font" font-size="9" fill="#555">CRE</text>
  <rect x="80" y="66" width="240" height="16" rx="2" fill="#e0e0e0"/>
  <rect x="80" y="66" width="211" height="16" rx="2" fill="#4CAF50" opacity="0.85">
    <animate attributeName="width" values="0;211" dur="1.2s" fill="freeze"/>
  </rect>
  <g clip-path="url(#clipCRE)">
    <polygon points="0,0 16,0 8,16 -8,16" fill="url(#shineGrad)">
      <animateTransform attributeName="transform" type="translate" values="50,66;50,66;310,66;310,66" keyTimes="0;0.75;0.9;1" dur="4s" begin="1.5s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <text x="340" y="78" class="pixel-font" font-size="9" fill="#555" text-anchor="end">88</text>

  <!-- TEC - Technical -->
  <text x="28" y="108" class="pixel-font" font-size="9" fill="#555">TEC</text>
  <rect x="80" y="96" width="240" height="16" rx="2" fill="#e0e0e0"/>
  <rect x="80" y="96" width="185" height="16" rx="2" fill="#42A5F5" opacity="0.85">
    <animate attributeName="width" values="0;185" dur="1.2s" fill="freeze"/>
  </rect>
  <g clip-path="url(#clipTEC)">
    <polygon points="0,0 16,0 8,16 -8,16" fill="url(#shineGrad)">
      <animateTransform attributeName="transform" type="translate" values="50,96;50,96;285,96;285,96" keyTimes="0;0.75;0.9;1" dur="4.3s" begin="1.8s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <text x="340" y="108" class="pixel-font" font-size="9" fill="#555" text-anchor="end">77</text>

  <!-- EXP - Exploration -->
  <text x="28" y="138" class="pixel-font" font-size="9" fill="#555">EXP</text>
  <rect x="80" y="126" width="240" height="16" rx="2" fill="#e0e0e0"/>
  <rect x="80" y="126" width="163" height="16" rx="2" fill="#EF5350" opacity="0.85">
    <animate attributeName="width" values="0;163" dur="1.2s" fill="freeze"/>
  </rect>
  <g clip-path="url(#clipEXP)">
    <polygon points="0,0 16,0 8,16 -8,16" fill="url(#shineGrad)">
      <animateTransform attributeName="transform" type="translate" values="50,126;50,126;263,126;263,126" keyTimes="0;0.75;0.9;1" dur="4.6s" begin="2.1s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <text x="340" y="138" class="pixel-font" font-size="9" fill="#555" text-anchor="end">68</text>

  <!-- SYN - Synergy -->
  <text x="28" y="168" class="pixel-font" font-size="9" fill="#555">SYN</text>
  <rect x="80" y="156" width="240" height="16" rx="2" fill="#e0e0e0"/>
  <rect x="80" y="156" width="108" height="16" rx="2" fill="#FDD835" opacity="0.85">
    <animate attributeName="width" values="0;108" dur="1.2s" fill="freeze"/>
  </rect>
  <g clip-path="url(#clipSYN)">
    <polygon points="0,0 16,0 8,16 -8,16" fill="url(#shineGrad)">
      <animateTransform attributeName="transform" type="translate" values="50,156;50,156;208,156;208,156" keyTimes="0;0.75;0.9;1" dur="4.9s" begin="2.4s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <text x="340" y="168" class="pixel-font" font-size="9" fill="#555" text-anchor="end">45</text>

  <!-- Bottom class label -->
  <line x1="20" y1="186" x2="380" y2="186" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="200" y="205" text-anchor="middle" class="pixel-font" font-size="7" fill="#999" letter-spacing="1">CLASS: DIGITAL / CREATIVE / ORGANIC</text>
</svg>
